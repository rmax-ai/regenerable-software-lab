# Compose file for the Regenerable Software Lab node-runner container
#
# Security properties:
#   - Non-root user (uid 1000)
#   - Read-only root filesystem
#   - Writable /workspace volume
#   - tmpfs-backed /tmp and /home/agent
#   - No host Docker socket
#   - No external network (network_mode: none)
#   - CPU and memory limits
#   - All capabilities dropped
#   - dumb-init for PID 1 signal handling

services:
  node-runner:
    build:
      context: ./node
      dockerfile: Dockerfile
    image: rsl-node-runner:dev
    user: "1000:1000"

    # Read-only root filesystem prevents runtime tampering
    read_only: true

    # Writable directories backed by tmpfs (memory only, no disk writes)
    tmpfs:
      - /tmp:size=100M,mode=1777,noexec,nosuid,nodev
      - /home/agent:size=10M,mode=0755,noexec,nosuid,nodev

    # Mount workspace as writable volume for agent output
    volumes:
      - type: volume
        source: runner-workspace
        target: /workspace
        volume:
          nocopy: true

    # Air-gapped — no network access at all
    network_mode: "none"

    # Drop all Linux capabilities, prevent privilege escalation
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Resource limits prevent DoS on host
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    mem_limit: 2g
    cpus: "2"

    # Limit PIDs and file descriptors
    pids_limit: 100
    ulimits:
      nofile:
        soft: 1024
        hard: 1024

    # Environment variables
    environment:
      - NODE_ENV=production
      - WORKSPACE=/workspace
      - TMPDIR=/tmp

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "node --version > /dev/null 2>&1 && test -w /tmp"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  runner-workspace:
    name: rsl-runner-workspace
