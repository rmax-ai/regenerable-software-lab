# Compose file for local testing of isolated agent containers
#
# Usage:
#   docker compose build          # Build the agent image
#   docker compose up             # Run with default command
#   docker compose run --rm agent bash   # Interactive shell
#   docker compose run --rm agent node dist/index.js   # Run the CLI
#
# Security properties (SPEC.md §17, RESEARCH.md §4):
#   - Non-root user (uid 1000)
#   - Read-only root filesystem
#   - Writable /workspace and /tmp (tmpfs-backed)
#   - No host Docker socket
#   - No external network (network_mode: none)
#   - CPU and memory limits (2GB mem, 2 CPUs)
#   - dumb-init for PID 1 signal handling
#   - All capabilities dropped
#   - No new privileges allowed

services:
  agent:
    build:
      context: ./node
      dockerfile: Dockerfile
      args:
        AGENT_UID: 1000
        AGENT_GID: 1000
    image: rsl-agent:latest
    user: "1000:1000"

    # Read-only root filesystem prevents tampering at runtime
    read_only: true

    # Writable directories backed by tmpfs (memory only, no disk writes)
    tmpfs:
      - /tmp:size=100M,mode=1777,noexec,nosuid,nodev
      - /home/agent:size=10M,mode=0755,noexec,nosuid,nodev

    # Mount workspace as writable volume for agent output
    volumes:
      - type: volume
        source: agent-workspace
        target: /workspace
        volume:
          nocopy: true

      # Mount spec assets as read-only (protected from agent modification)
      - type: bind
        source: ../spec
        target: /spec
        read_only: true

    # Air-gapped — no network access at all
    network_mode: "none"

    # Drop all Linux capabilities, prevent privilege escalation
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Resource limits prevent DoS on host
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    mem_limit: 2g
    cpus: "2"

    # Limit PIDs and file descriptors
    pids_limit: 100
    ulimits:
      nofile:
        soft: 1024
        hard: 1024

    # Environment variables
    environment:
      - NODE_ENV=production
      - WORKSPACE=/workspace
      - TMPDIR=/tmp

    # Health check — verify the entrypoint and node are functional
    healthcheck:
      test: ["CMD-SHELL", "node --version > /dev/null 2>&1 && test -w /tmp"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agent-workspace:
    name: rsl-agent-workspace
